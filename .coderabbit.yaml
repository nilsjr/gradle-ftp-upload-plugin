# .coderabbit.yaml
# CodeRabbit config — solo dev, GitFlow, low-noise reviews

reviews:
  profile: chill  # relaxed tone, fewer nitpicks — good for "unimportant" projects

  auto_review:
    enabled: true
    # keep it quiet: on new pushes, only re-review the added commits
    auto_incremental_review: true
    ignore_usernames:
      - "renovate[bot]"
      - "dependabot[bot]"
      - "github-actions[bot]"
    base_branches:
      - "develop"
      - "main"
      # add "release/.*" or "hotfix/.*" here if you want reviews on those merges too

  request_changes_workflow: false  # never blocks merge, just comments

  path_filters:
    - "!**/*.lock"
    - "!**/package-lock.json"
    - "!**/pnpm-lock.yaml"
    - "!**/dist/**"
    - "!**/*.md"

# let CodeRabbit answer follow-up questions in PR comments automatically
chat:
  auto_reply: true
